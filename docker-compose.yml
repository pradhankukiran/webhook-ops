x-app-environment: &app-environment
  DEBUG: ${DEBUG:-true}
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000}
  DATABASE_URL: ${DATABASE_URL:-postgres://webhookops:webhookops@db:5432/webhookops}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
  WEBHOOKOPS_PRIVATE_PROXY_URL: ${WEBHOOKOPS_PRIVATE_PROXY_URL:-http://tunnel:9080}
  WEBHOOKOPS_PUBLIC_TUNNEL_ENDPOINT: ${WEBHOOKOPS_PUBLIC_TUNNEL_ENDPOINT:-localhost:9700}
  WEBHOOKOPS_TUNNEL_SECRET: ${WEBHOOKOPS_TUNNEL_SECRET:-dev-secret}
  WEBHOOKOPS_TUNNEL_STATUS_TOKEN: ${WEBHOOKOPS_TUNNEL_STATUS_TOKEN:-dev-status-token}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhookops
      POSTGRES_USER: webhookops
      POSTGRES_PASSWORD: webhookops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhookops -d webhookops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  tunnel:
    build:
      context: ./agent
    environment:
      WEBHOOKOPS_TUNNEL_SECRET: ${WEBHOOKOPS_TUNNEL_SECRET:-dev-secret}
      WEBHOOKOPS_TUNNEL_STATUS_URL: ${WEBHOOKOPS_TUNNEL_STATUS_URL:-http://web:8000/internal/tunnel/agent-status/}
      WEBHOOKOPS_TUNNEL_STATUS_TOKEN: ${WEBHOOKOPS_TUNNEL_STATUS_TOKEN:-dev-status-token}
    ports:
      - "9700:9700"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn webhook_ops.wsgi:application --bind 0.0.0.0:8000"
    environment: *app-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A webhook_ops worker --loglevel=info
    environment: *app-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tunnel:
        condition: service_started

  beat:
    build: .
    command: celery -A webhook_ops beat --loglevel=info
    environment: *app-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
